name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/metrics.yml

permissions:
  contents: write

concurrency:
  group: github-metrics
  cancel-in-progress: true

jobs:
  isocalendar:
    runs-on: ubuntu-latest
    steps:
      - name: Generate light full-year isocalendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: assets/metrics.plugin.isocalendar.fullyear.light.svg
          output_condition: data-changed
          committer_message: "chore: update light GitHub metrics [skip ci]"
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Generate dark full-year isocalendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: assets/metrics.plugin.isocalendar.fullyear.dark.svg
          output_condition: data-changed
          committer_message: "chore: update dark GitHub metrics [skip ci]"
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          extras_css: |
            svg {
              color: #c9d1d9 !important;
              background: transparent !important;
            }
            h1, h2, h3 {
              color: #58a6ff !important;
            }
            .field svg {
              fill: #8b949e !important;
            }
            text {
              fill: #c9d1d9 !important;
            }
            footer, .h-details, .footnote {
              color: #8b949e !important;
            }
